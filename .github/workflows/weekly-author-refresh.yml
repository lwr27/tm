name: Weekly full author-stat refresh
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: update-data
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Clear cached author/finisher counts
        run: npm run wipe-author-stats
      - name: Re-fetch author/finisher counts for every map
        run: npm run authors
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}
      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add authors.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: weekly author-stat refresh $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
