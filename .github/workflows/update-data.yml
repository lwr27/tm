name: Update TOTD data
on:
  schedule:
    # Daily at 21:00 UTC — comfortably after the day's new TOTD is live
    # and its leaderboard has some finishers on it.
    - cron: '0 21 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: update-data
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Update COTD cup history
        run: npm run update
      - name: Fetch author medal stats for new TOTD maps
        run: npm run authors
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}
      - name: Update map style tags / TMX ids for new maps
        run: npm run tags
      - name: Refresh personal author medals
        run: npm run medals
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}
      - name: Fetch division opponents for new cups
        # Resumable via processedCups — daily runs only touch whatever
        # cup(s) got added just now (normally 1 per player), never
        # re-walks the full history. Needs Nadeo creds like authors/medals.
        run: npm run opponents
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}
      - name: Resolve names/clan tags for any new opponents
        # Resumable via players.json — only resolves accountIds that
        # showed up for the first time in today's opponents run. No Nadeo
        # creds needed, trackmania.io's player endpoint is public.
        #
        # MAX_RUNTIME_MINUTES is deliberately short here: this step should
        # only ever be catching up on the handful of opponents from
        # today's single new cup, not chewing through the full backlog
        # from a one-time bulk backfill (that's what the separate
        # "Backfill player names and clan tags" workflow is for, with its
        # own much longer default budget). Capping it here stops the
        # nightly job from silently turning into an hours-long run.
        run: npm run names
        env:
          MAX_RUNTIME_MINUTES: 10
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json map-tags.json authors.json totd-months.json opponents.json players.json
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: daily update $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
