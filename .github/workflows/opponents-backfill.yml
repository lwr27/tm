name: Backfill division opponents

# Manual only, for now. The probe confirmed the data chain works
# end-to-end; once a real run completes and the data looks right, fold
# `npm run opponents` into update-data.yml's daily steps too (daily upkeep
# is cheap: 3 players x 1 division = a handful of requests).
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch division opponents
        run: npm run opponents
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}

      - name: Commit opponents data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opponents.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: division opponents backfill $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
