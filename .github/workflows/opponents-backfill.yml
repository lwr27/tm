name: Backfill division opponents

# Manual only, for now — this hits an endpoint we haven't verified from
# outside the sandbox yet. Once a run succeeds and the data looks right,
# fold `npm run opponents` into update-data.yml's daily steps instead.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch division opponents
        run: npm run opponents

      - name: Commit opponents data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opponents.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: division opponents backfill $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
