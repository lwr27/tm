name: Backfill division opponents

# Manual only. Currently runs the PROBE, not the real backfill — we don't
# yet know if trackmania.io's cup id maps directly to Nadeo's competition
# id. Once the probe confirms that (or tells us what's needed instead),
# swap the final step back to `npm run opponents`.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Probe the competition-id question
        run: node probe-opponents.js
        env:
          NADEO_SERVER_LOGIN: ${{ secrets.NADEO_SERVER_LOGIN }}
          NADEO_SERVER_PASSWORD: ${{ secrets.NADEO_SERVER_PASSWORD }}
